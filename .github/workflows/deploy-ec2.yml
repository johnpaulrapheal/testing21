name: Deploy EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEFAULT_APP_DIR: /home/ubuntu/interview1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project files to EC2
        run: |
          APP_DIR="${{ vars.EC2_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then APP_DIR="$DEFAULT_APP_DIR"; fi
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'loanapp/node_modules/' \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${APP_DIR}/"

      - name: Run deploy script on EC2
        run: |
          APP_DIR="${{ vars.EC2_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then APP_DIR="$DEFAULT_APP_DIR"; fi
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "export EC2_PUBLIC_HOST='${{ secrets.EC2_HOST }}'; export APP_ROOT='${APP_DIR}'; cd ${APP_DIR} && bash deploy/ec2/deploy.sh"
