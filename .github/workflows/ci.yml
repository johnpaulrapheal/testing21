name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rest_api/loan_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: rest_api/loan_app/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DJANGO_DEBUG: "False"
          DB_ENGINE: sqlite
        run: python manage.py test loanapp1

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loanapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: loanapp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Expo web export
        env:
          EXPO_PUBLIC_API_BASE_URL: /api
        run: npx expo export -p web
